<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Student LLM Chat Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 40px auto; }
    #chat { border: 1px solid #ccc; padding: 16px; min-height: 320px; margin-bottom: 12px; }
    .user { text-align: right; margin: 8px; }
    .bot { background: #eee; padding: 8px; margin: 8px; border-radius: 8px; white-space: pre-wrap; }
    input { width: 75%; padding: 10px; }
    button { padding: 10px 16px; }
  </style>
</head>
<body>
  <h1>Automated LLM Chat Gruppe 2</h1>
  <div id="chat"></div>

  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>

  <script>
    const webhookUrl = "http://10.204.18.32:8102/webhook/8781f1b4-f353-4bc9-a096-0bd4cd4441eb";



    async function send() {
      const input = document.getElementById("msg");
      const chat = document.getElementById("chat");
      const message = input.value.trim();
      if (!message) return;

      chat.innerHTML += `<div class="user"><b>You:</b> ${escapeHtml(message)}</div>`;
      input.value = "";

      const res = await fetch(webhookUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({ message })
      });

      const data = await res.json();
      chat.innerHTML += `<div class="bot"><b>Bot:</b> ${escapeHtml(data.reply || JSON.stringify(data))}</div>`;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, s => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[s]));
    }
  </script>
</body>
</html>
